name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 1. 运行 vcpkg 清单模式恢复依赖（在云端虚拟机中编译出真正的 heif 和 lcms2 静态库及头文件）
    - name: Run vcpkg to restore dependencies
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: './vcpkg.json'

    # 2. 物理重构 3rd-party 目录，完美对齐 #include "libheif/heif.h" 和 #include "lcms2.h"
    - name: Fix Hardcoded Third-Party Directories
      shell: powershell
      run: |
        # 创建标准的 3rd-party 根结构
        New-Item -ItemType Directory -Force -Path "3rd-party"

        # 锁定 vcpkg 实际下载解压的系统头文件根目录
        $vcpkgIncludePath = "$env:VCPKG_ROOT\installed\x64-windows\include"
        echo "Vcpkg Include Path is: $vcpkgIncludePath"

        if (Test-Path $vcpkgIncludePath) {
            # 绝杀核心一：直接把整个 vcpkg 的 include 树复制进项目的 3rd-party
            # 这样 3rd-party/libheif/heif.h 就会变成物理事实，完美对齐 #include "libheif/heif.h"
            Copy-Item -Path "$vcpkgIncludePath\*" -Destination "3rd-party\" -Recurse -Force
            
            # 绝杀核心二：为了兼容部分源码直接无前缀 #include "heif.h" 或寻找旧版物理夹
            # 我们在 3rd-party 下再冗余复制一份 libheif 内部文件
            if (Test-Path "$vcpkgIncludePath\libheif") {
                New-Item -ItemType Directory -Force -Path "3rd-party/libheif"
                Copy-Item -Path "$vcpkgIncludePath\libheif\*" -Destination "3rd-party/libheif\" -Recurse -Force
            }
            
            # 绝杀核心三：解决 #include "lcms2.h"，直接把它丢到 3rd-party 根目录下及各个子目录下，多点狙击
            if (Test-Path "$vcpkgIncludePath\lcms2.h") {
                Copy-Item -Path "$vcpkgIncludePath\lcms2.h" -Destination "3rd-party\" -Force
                Copy-Item -Path "$vcpkgIncludePath\lcms2.h" -Destination "3rd-party/libheif\" -Force
            }
            echo "Successfully mirrored full vcpkg structure to 3rd-party."
        } else {
            Write-Error "Vcpkg include path not found! Check vcpkg restore step."
        }

    # 3. 动态生成功能完备的本地 Photoshop SDK 替代存根并强制覆盖硬编码路径
    - name: Generate Local Photoshop Stub Headers
      shell: powershell
      run: |
        $sdkPath = "${{ github.workspace }}\local-ps-sdk"
        New-Item -ItemType Directory -Force -Path $sdkPath

        # 基础平台宏
        $pidDef = @"
        #ifndef __PIDEFINES_H__
        #define __PIDEFINES_H__
        #ifndef MSWindows
        #define MSWindows 1
        #endif
        #ifndef Windows
        #define Windows 1
        #endif
        #define SystemProcessor 2
        #endif
        "@
        Set-Content -Path "$sdkPath\PIDefines.h" -Value $pidDef

        # 核心跨平台基本数据类型
        $piTypes = @"
        #ifndef __PITYPES_H__
        #define __PITYPES_H__
        #include <stdint.h>
        typedef int32_t int32;
        typedef uint32_t uint32;
        typedef int16_t int16;
        typedef uint16_t uint16;
        typedef int8_t int8;
        typedef uint8_t uint8;
        typedef int32_t SPErr;
        typedef void* PIActionDescriptor;
        typedef struct Procs *PITypeVoid;
        #ifndef MAC_env
        typedef char * Ptr;
        typedef char ** Handle;
        #endif
        #endif
        "@
        Set-Content -Path "$sdkPath\PITypes.h" -Value $piTypes

        # 核心文件格式结构体骨架（平替 PIFormat.h 阻碍）
        $piFormat = @"
        #ifndef __PIFORMAT_H__
        #define __PIFORMAT_H__
        #include "PITypes.h"
        typedef struct FormatRecord {
            int32_t  serialNumber;
            void*    platformData;
            int16_t  imageMode;
            int16_t  imageSizeY;
            int16_t  imageSizeX;
            int16_t  depth;
            int16_t  planes;
            char     reserved[256];
        } FormatRecord, *FormatRecordPtr;
        #endif
        "@
        Set-Content -Path "$sdkPath\PIFormat.h" -Value $piFormat

        # “关于”对话框结构体骨架（平替 PIAbout.h）
        $piAbout = @"
        #ifndef __PIABOUT_H__
        #define __PIABOUT_H__
        #include "PITypes.h"
        typedef struct AboutRecord {
            void* platformData;
            char  reserved[128];
        } AboutRecord, *AboutRecordPtr;
        #endif
        "@
        Set-Content -Path "$sdkPath\PIAbout.h" -Value $piAbout

        # 其他常规模板防护桩
        @("PITerminology.h", "PIActions.h", "PIGeneral.h", "PIProperties.h") | ForEach-Object {
            $name = $_
            $macro = "__" + $name.Replace(".", "_").ToUpper() + "__"
            Set-Content -Path "$sdkPath\$name" -Value "#ifndef $macro`n#define $macro`n#endif"
        }

        # 1) 分发到 C++ 源码公共目录
        Copy-Item -Path "$sdkPath\*" -Destination "src\common\" -Force
        
        # 2) 暴力注入到项目硬编码寻找的宿主 SDK 相对目录，彻底解决所有包含了该 SDK 的绝对文件
        $hardcodedPsDirs = @(
            "3rd-party/adobe_photoshop_sdk/pluginsdk/photoshopapi/photoshop",
            "3rd-party/adobe_photoshop_sdk/pluginsdk/photoshopapi/pica_sp",
            "3rd-party/adobe_photoshop_sdk/pluginsdk/samplecode/common/includes"
        )
        foreach ($dir in $hardcodedPsDirs) {
            New-Item -ItemType Directory -Force -Path $dir
            Copy-Item -Path "$sdkPath\*" -Destination $dir -Force
        }
        
        echo "Photoshop Stub headers perfectly dispatched."

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 4. 执行纯净构建：此时 3rd-party 文件夹下已经是完全准备就绪的物理依赖，不依赖任何外界变量
    - name: Build Solution
      run: |
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n
      env:
        PhotoshopSDKDir: ${{ github.workspace }}\local-ps-sdk\

    # 5. 自动收集编译出的正式 Photoshop 插件文件（.8bi）
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/AvifFormat.8bi
          vs/Release/AvifFormat.8bi
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
