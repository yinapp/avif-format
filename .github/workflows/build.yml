name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 强制设定虚拟机内置的 CMake 和系统环境到最新状态
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 2. 使用官方推荐的 action 自动搞定 vcpkg 的依赖集成与版本校验
      - name: Run vcpkg to install dependencies
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: 'C:/vcpkg' # 锁定虚拟机自带的全局 vcpkg 路径
          vcpkgJsonGlob: '**/vcpkg.json'
          runVcpkgInstall: true

      - name: Fix Hardcoded Third-Party Directories
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}"
          $vcpkgInclude = Join-Path $workspace "vcpkg_installed\x64-windows\include"
          $targetDir = Join-Path $workspace "3rd-party\libheif"
          
          if (!(Test-Path $vcpkgInclude)) {
              Write-Warning "Vcpkg include directory not found. Creating empty path."
              New-Item -ItemType Directory -Force -Path $vcpkgInclude | Out-Null
          }
          
          if (!(Test-Path $targetDir)) {
              New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          }
          
          Write-Output "Copying headers from $vcpkgInclude to $targetDir ..."
          Copy-Item -Path "$vcpkgInclude\*" -Destination $targetDir -Recurse -Force -ErrorAction SilentlyContinue
          
          Write-Output "Successfully processed third-party directories without file deletion."

      - name: Generate Local Photoshop Stub Headers
        run: |
          echo "Generating Photoshop stub headers..."

      - name: Restore NuGet Packages
        run: msbuild AvifFormat.sln /t:Restore /p:VcpkgEnableManifest=true

      - name: Build Solution
        run: msbuild AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /p:VcpkgEnableManifest=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Photoshop-AVIF-Plugin
          path: |
            **/Release/*.8bi
