name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # 必须递归拉取子模块
        fetch-depth: 0        # 完整拉取历史，防止依赖部分丢失

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AVIFImage.sln

    # 如果有预编译事件或子依赖，让 MSBuild 在编译总项目前自己分析并解决
    - name: Build Solution with Dependencies
      run: |
        msbuild vs/AVIFImage.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
          bin/x64/Release/Av1Image.8bi
