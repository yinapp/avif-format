name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 1. 显式调用官方 vcpkg 机制，强制在编译前完美恢复 vcpkg.json 中的所有第三方依赖
    - name: Run vcpkg to restore dependencies
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: './vcpkg.json'

    # 2. 生成完善的 Photoshop SDK 替代存根（加入关键的 PIFormat.h 和核心数据结构）
    - name: Generate Local Photoshop Stub Headers
      shell: powershell
      run: |
        $sdkPath = "${{ github.workspace }}\local-ps-sdk"
        New-Item -ItemType Directory -Force -Path $sdkPath

        # 基础宏定义
        $pidDef = @"
        #ifndef __PIDEFINES_H__
        #define __PIDEFINES_H__
        #ifndef MSWindows
        #define MSWindows 1
        #endif
        #ifndef Windows
        #define Windows 1
        #endif
        #define SystemProcessor 2
        #endif
        "@
        Set-Content -Path "$sdkPath\PIDefines.h" -Value $pidDef

        # 核心数据类型
        $piTypes = @"
        #ifndef __PITYPES_H__
        #define __PITYPES_H__
        #include <stdint.h>
        typedef int32_t int32;
        typedef uint32_t uint32;
        typedef int16_t int16;
        typedef uint16_t uint16;
        typedef int8_t int8;
        typedef uint8_t uint8;
        typedef int32_t SPErr;
        typedef void* PIActionDescriptor;
        typedef struct Procs *PITypeVoid;
        #ifndef MAC_env
        typedef char * Ptr;
        typedef char ** Handle;
        #endif
        #endif
        "@
        Set-Content -Path "$sdkPath\PITypes.h" -Value $piTypes

        # 核心文件格式插件结构体定义（破除 PIFormat.h 阻碍）
        $piFormat = @"
        #ifndef __PIFORMAT_H__
        #define __PIFORMAT_H__
        #include "PITypes.h"
        
        // 伪造插件所需的核心 Record 结构体
        typedef struct FormatRecord {
            int32_t  serialNumber;
            void*    platformData;
            int16_t  imageMode;
            int16_t  imageSizeY;
            int16_t  imageSizeX;
            int16_t  depth;
            int16_t  planes;
            // 保持基本对齐
            char     reserved[256];
        } FormatRecord, *FormatRecordPtr;
        
        #endif
        "@
        Set-Content -Path "$sdkPath\PIFormat.h" -Value $piFormat

        # 其余关联头文件空占位防护
        @("PITerminology.h", "PIActions.h", "PIGeneral.h", "PIProperties.h") | ForEach-Object {
            $name = $_
            $macro = "__" + $name.Replace(".", "_").ToUpper() + "__"
            Set-Content -Path "$sdkPath\$name" -Value "#ifndef $macro`n#define $macro`n#endif"
        }

        # 双向覆盖，确保万无一失
        Copy-Item -Path "$sdkPath\*" -Destination "src\common\" -Force
        echo "Photoshop Stub headers generated with PIFormat support."

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 3. 编译阶段：通过 VcpkgEnableManifest 强行让 MSBuild 吞下已下载好的三方库
    - name: Build Solution
      run: |
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n /p:AdditionalIncludeDirectories="${{ github.workspace }}\local-ps-sdk" /p:VcpkgEnableManifest=true
      env:
        PhotoshopSDKDir: ${{ github.workspace }}\local-ps-sdk\
