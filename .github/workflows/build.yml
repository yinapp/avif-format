name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 1. 切换为 Adobe 官方在 GitHub 上的开源 SDK 仓
    - name: Clone Official Adobe Photoshop SDK
      uses: actions/checkout@v4
      with:
        repository: adobe-photoshop/spaces-adapter
        path: photoshop-sdk-dir
        ref: main

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 2. 双保险注入：通过 env 变量 + MSBuild 路径参数强制打通 PIDefines.h
    # 官方仓的头文件在 spaces-adapter/pluginsdk/samplecode/common/includes 目录下
    - name: Build Solution
      run: |
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n /p:AdditionalIncludeDirectories="${{ github.workspace }}\photoshop-sdk-dir\pluginsdk\samplecode\common\includes"
      env:
        PhotoshopSDKDir: ${{ github.workspace }}\photoshop-sdk-dir\pluginsdk\

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/AvifFormat.8bi
          vs/Release/AvifFormat.8bi
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
