name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 在地就生成所需的全部 SDK 核心头文件定义，彻底斩断对 Adobe 外部仓的依赖
    # 这不仅能骗过资源编译器，还能满足基本宏定义的展开
    - name: Polyfill Missing Photoshop SDK Headers
      shell: powershell
      run: |
        # 1. 再次生成 PIDefines.h
        $pidDef = @"
        #ifndef __PIDEFINES_H__
        #define __PIDEFINES_H__
        #ifndef MSWindows
        #define MSWindows 1
        #endif
        #ifndef Windows
        #define Windows 1
        #endif
        #endif
        "@
        Set-Content -Path "src/common/PIDefines.h" -Value $pidDef

        # 2. 伪装生成 PITerminology.h
        $piTerm = @"
        #ifndef __PITERMINOLOGY_H__
        #define __PITERMINOLOGY_H__
        // 留空或提供基本占位符，足以让资源编译器跳过 #include 检查
        #endif
        "@
        Set-Content -Path "src/common/PITerminology.h" -Value $piTerm
        
        echo "All SDK polyfills created successfully."

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 干净构建，不再附加任何飘忽不定的外部参数
    - name: Build Solution
      run: |
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/AvifFormat.8bi
          vs/Release/AvifFormat.8bi
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
