name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 1. 独立、干净地下载 Adobe 官方 Photoshop SDK 并解压
    - name: Download and Extract Adobe Photoshop SDK
      shell: powershell
      run: |
        $url = "https://download.adobe.com/pub/adobe/photoshop/cplusplus/win/Photoshop_2021_SDK_win.zip"
        $output = "photoshop_sdk.zip"
        echo "Downloading Adobe Photoshop SDK..."
        Invoke-WebRequest -Uri $url -OutFile $output
        echo "Extracting SDK..."
        Expand-Archive -Path $output -DestinationPath "$env:USERPROFILE\photoshop-sdk"
        echo "SDK ready at $env:USERPROFILE\photoshop-sdk"

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 2. 编译阶段：通过 env 注入宏，或者直接用 MSBuild 参数注入头文件路径（十拿九稳）
    - name: Build Solution
      run: |
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n /p:AdditionalIncludeDirectories="$env:USERPROFILE\photoshop-sdk\pluginsdk\samplecode\common\includes"
      shell: cmd

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/AvifFormat.8bi
          vs/Release/AvifFormat.8bi
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
