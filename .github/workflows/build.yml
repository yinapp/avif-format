name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 1. 核心大招：在本地直接动态创建一模一样的 PIDefines.h 伪装文件
    # 这样资源编译器就能顺利通过，不再依赖任何外部下载
    - name: Polyfill Photoshop SDK Header
      shell: powershell
      run: |
        $headerContent = @"
        #ifndef __PIDEFINES_H__
        #define __PIDEFINES_H__
        
        #ifndef MSWindows
        #define MSWindows 1
        #endif
        
        #ifndef Windows
        #define Windows 1
        #endif
        
        #endif // __PIDEFINES_H__
        "@
        # 写入到源码查找头文件的对应目录下
        Set-Content -Path "src/common/PIDefines.h" -Value $headerContent
        echo "PIDefines.h polyfill created successfully."

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 2. 干净编译，让 MSBuild 在项目根目录下自行检索
    - name: Build Solution
      run: |
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/AvifFormat.8bi
          vs/Release/AvifFormat.8bi
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
