name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 1. 修正解决方案文件名（改为 AvifFormat.sln）
    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 2. 修正编译目标文件名
    - name: Build Solution
      run: |
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n

    # 3. 收集编译生成的插件产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/AvifFormat.8bi
          vs/Release/AvifFormat.8bi
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
