name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 1. 运行 vcpkg 清单模式恢复依赖（在云端虚拟机中编译出真正的 heif 和 lcms2 静态库及头文件）
    - name: Run vcpkg to restore dependencies
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: './vcpkg.json'

    # 2. 物理伪装硬编码的 3rd-party 相对目录，将 vcpkg 恢复出来的头文件精准拦截并重定向
    - name: Fix Hardcoded Third-Party Directories
      shell: powershell
      run: |
        # 创建项目工程硬编码寻找的相对路径
        New-Item -ItemType Directory -Force -Path "3rd-party/libheif/libheif"
        New-Item -ItemType Directory -Force -Path "3rd-party/libheif/build-x64"
        New-Item -ItemType Directory -Force -Path "3rd-party/aom"

        # 从 vcpkg 的安装副本中把 heif 核心头文件拷贝过来
        $vcpkgInstalledPath = "$env:VCPKG_ROOT\installed\x64-windows\include"
        if (Test-Path "$vcpkgInstalledPath\libheif") {
            Copy-Item -Path "$vcpkgInstalledPath\libheif\*" -Destination "3rd-party/libheif/libheif" -Recurse -Force
            Copy-Item -Path "$vcpkgInstalledPath\libheif\*" -Destination "3rd-party/libheif" -Recurse -Force
            echo "Successfully mapped libheif headers from vcpkg."
        }

        # 顺便把色彩管理 lcms2.h 塞进硬编码包含路径中
        if (Test-Path "$vcpkgInstalledPath\lcms2.h") {
            Copy-Item -Path "$vcpkgInstalledPath\lcms2.h" -Destination "3rd-party/libheif/" -Force
            echo "Successfully mapped lcms2 headers."
        }

    # 3. 动态生成功能完备的本地 Photoshop SDK 替代存根（含 PIFormat.h 和 PIAbout.h 核心数据结构）
    - name: Generate Local Photoshop Stub Headers
      shell: powershell
      run: |
        $sdkPath = "${{ github.workspace }}\local-ps-sdk"
        New-Item -ItemType Directory -Force -Path $sdkPath

        # 基础平台宏
        $pidDef = @"
        #ifndef __PIDEFINES_H__
        #define __PIDEFINES_H__
        #ifndef MSWindows
        #define MSWindows 1
        #endif
        #ifndef Windows
        #define Windows 1
        #endif
        #define SystemProcessor 2
        #endif
        "@
        Set-Content -Path "$sdkPath\PIDefines.h" -Value $pidDef

        # 核心跨平台基本数据类型
        $piTypes = @"
        #ifndef __PITYPES_H__
        #define __PITYPES_H__
        #include <stdint.h>
        typedef int32_t int32;
        typedef uint32_t uint32;
        typedef int16_t int16;
        typedef uint16_t uint16;
        typedef int8_t int8;
        typedef uint8_t uint8;
        typedef int32_t SPErr;
        typedef void* PIActionDescriptor;
        typedef struct Procs *PITypeVoid;
        #ifndef MAC_env
        typedef char * Ptr;
        typedef char ** Handle;
        #endif
        #endif
        "@
        Set-Content -Path "$sdkPath\PITypes.h" -Value $piTypes

        # 核心文件格式结构体骨架（平替 PIFormat.h 阻碍）
        $piFormat = @"
        #ifndef __PIFORMAT_H__
        #define __PIFORMAT_H__
        #include "PITypes.h"
        typedef struct FormatRecord {
            int32_t  serialNumber;
            void*    platformData;
            int16_t  imageMode;
            int16_t  imageSizeY;
            int16_t  imageSizeX;
            int16_t  depth;
            int16_t  planes;
            char     reserved[256];
        } FormatRecord, *FormatRecordPtr;
        #endif
        "@
        Set-Content -Path "$sdkPath\PIFormat.h" -Value $piFormat

        # “关于”对话框结构体骨架（平替 PIAbout.h）
        $piAbout = @"
        #ifndef __PIABOUT_H__
        #define __PIABOUT_H__
        #include "PITypes.h"
        typedef struct AboutRecord {
            void* platformData;
            char  reserved[128];
        } AboutRecord, *AboutRecordPtr;
        #endif
        "@
        Set-Content -Path "$sdkPath\PIAbout.h" -Value $piAbout

        # 其他常规模板防护桩
        @("PITerminology.h", "PIActions.h", "PIGeneral.h", "PIProperties.h") | ForEach-Object {
            $name = $_
            $macro = "__" + $name.Replace(".", "_").ToUpper() + "__"
            Set-Content -Path "$sdkPath\$name" -Value "#ifndef $macro`n#define $macro`n#endif"
        }

        # 1) 分发到 C++ 源码公共目录
        Copy-Item -Path "$sdkPath\*" -Destination "src\common\" -Force
        
        # 2) 分发到工程里硬编码寻找的宿主 SDK 相对目录，双层拦截
        $hardcodedPsDir = "3rd-party/adobe_photoshop_sdk/pluginsdk/photoshopapi/photoshop"
        New-Item -ItemType Directory -Force -Path $hardcodedPsDir
        Copy-Item -Path "$sdkPath\*" -Destination $hardcodedPsDir -Force
        
        echo "Photoshop Stub headers perfectly dispatched."

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 4. 执行最终构建：利用 INCLUDE 环境变量无损注入附加路径，规避 MSBuild 命令行转义死锁
    - name: Build Solution
      shell: powershell
      run: |
        # 隐式挂载包含路径，让所有 CL.exe 编译器原生可见
        $env:INCLUDE = "${{ github.workspace }}\local-ps-sdk;${{ github.workspace }}\3rd-party\libheif;$env:INCLUDE"
        
        # 启动 MSBuild 干净编译
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n
      env:
        PhotoshopSDKDir: ${{ github.workspace }}\local-ps-sdk\

    # 5. 自动收集编译出的正式 Photoshop 插件文件（.8bi）
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/AvifFormat.8bi
          vs/Release/AvifFormat.8bi
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
