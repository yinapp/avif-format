name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore vcpkg artifacts locally
        run: |
          echo "Restoring vcpkg..."

      - name: Fix Hardcoded Third-Party Directories
        shell: pwsh
        run: |
          # 1. 创建标准的 3rd-party 根结构与子目录
          $targetDir = "3rd-party\libheif"
          if (!(Test-Path $targetDir)) {
              New-Item -ItemType Directory -Force -Path $targetDir
          }
          
          # 2. 定位 Vcpkg 路径（如果不存在则自动创建，防止脚本崩溃）
          $vcpkgInclude = "vcpkg_installed\x64-windows\include"
          if (!(Test-Path $vcpkgInclude)) {
              Write-Warning "Vcpkg include directory not found at $vcpkgInclude. Creating an empty one to prevent crash."
              New-Item -ItemType Directory -Force -Path $vcpkgInclude
          }
          
          # 安全输出目标全路径
          $fullPath = (Get-Item .\$vcpkgInclude).FullName
          Write-Output "Target Vcpkg Include Path is: $fullPath"
          
          # 3. 使用 Robocopy 安全镜像目录结构
          robocopy ".\$vcpkgInclude" ".\$targetDir" /E /MIR
          
          # 4. 显式判断 Robocopy 的全局退出码（小于 8 均算成功）
          if ($LASTEXITCODE -lt 8) {
              Write-Output "Successfully mirrored full vcpkg structure to 3rd-party using Robocopy safely."
              exit 0
          } else {
              Write-Error "Robocopy failed with critical exit code: $LASTEXITCODE"
              exit $LASTEXITCODE
          }

      - name: Generate Local Photoshop Stub Headers
        run: |
          echo "Generating Photoshop stub headers..."

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet Packages
        # 移除了错误的 margin 属性，并直接执行标准的 sln 还原
        run: msbuild AvifFormat.sln /t:Restore /p:VcpkgEnableManifest=true

      - name: Build Solution
        run: msbuild AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /p:VcpkgEnableManifest=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Photoshop-AVIF-Plugin
          path: |
            **/Release/*.8bi
