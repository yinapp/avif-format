name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 1. 借用 Adobe 官方维护的 WebP 插件仓（里面有完整且公开的全套 PS SDK 头文件）
    - name: Clone Adobe WebP-MUX SDK (Contains full PISDK headers)
      uses: actions/checkout@v4
      with:
        repository: adobe-photoshop/webp-photoshop-plugin
        path: webp-sdk-source
        ref: main

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 2. 强制将拉取到的全套官方头文件路径，暴力塞给 MSBuild 的附加包含目录参数
    # 该仓的头文件完美存放在 webp-sdk-source/pluginsdk/samplecode/common/includes 下
    - name: Build Solution
      run: |
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n /p:AdditionalIncludeDirectories="${{ github.workspace }}\webp-sdk-source\pluginsdk\samplecode\common\includes"
      env:
        PhotoshopSDKDir: ${{ github.workspace }}\webp-sdk-source\pluginsdk\

    # 3. 收集编译生成的插件产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/AvifFormat.8bi
          vs/Release/AvifFormat.8bi
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
