name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # 确保拉取了所有子模块

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 第一步：必须要先编译第三方依赖库 (libheif / aom 等)
    - name: Build Third Party Dependencies
      run: |
        cd 3rd-party
        ./builddeps.cmd
      shell: cmd

    - name: Restore NuGet Packages
      run: nuget restore vs/AVIFImage.sln

    # 第二步：再编译主体 Photoshop 插件
    - name: Build x64 Release
      run: msbuild vs/AVIFImage.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
