name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore vcpkg artifacts locally
        # 这里顺延你原本的 vcpkg 恢复步骤，保持不变
        # 假设你使用的是标准的 run 或 action，请根据实际情况保留
        run: |
          echo "Restoring vcpkg..."
          # 如果有实际的 vcpkg 恢复命令请留在此处

      - name: Fix Hardcoded Third-Party Directories
        shell: pwsh
        run: |
          # 1. 创建标准的 3rd-party 根结构与子目录
          $targetDir = "3rd-party\libheif"
          if (!(Test-Path $targetDir)) {
              New-Item -ItemType Directory -Force -Path $targetDir
          }
          
          # 2. 定位并输出 Vcpkg 路径
          $vcpkgInclude = "vcpkg_installed\x64-windows\include"
          Write-Output "Target Vcpkg Include Path is: $(Get-Item .\$vcpkgInclude).FullName"
          
          # 3. 使用 Robocopy 安全镜像目录结构
          # 注意：Robocopy 的退出码 1 代表“成功复制了文件”。在 GitHub Actions 中需要特殊处理。
          robocopy ".\$vcpkgInclude" ".\$targetDir" /E /MIR
          
          # 4. 核心修复：显式判断 Robocopy 的全局退出码
          # Robocopy 退出码小于 8 均代表执行成功或有正常文件更新
          if ($LASTEXITCODE -lt 8) {
              Write-Output "Successfully mirrored full vcpkg structure to 3rd-party using Robocopy safely."
              exit 0
          } else {
              Write-Error "Robocopy failed with critical exit code: $LASTEXITCODE"
              exit $LASTEXITCODE
          }

      - name: Generate Local Photoshop Stub Headers
        run: |
          echo "Generating Photoshop stub headers..."
          # 请在此处保留你原本用于生成头文件的脚本内容

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet Packages
        run: msbuild /t:Restore

      - name: Build Solution
        run: msbuild /p:Configuration=Release /p:Platform=x64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Photoshop-AVIF-Plugin
          path: |
            **/Release/*.8bi
