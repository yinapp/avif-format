name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 签出代码（源码此时安全降落）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. 初始化标准 MSBuild 环境
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 3. 核心修复：将安装根目录隔离到独立的子目录里，断绝 vcpkg 抹除根目录源码的可能
      - name: Install Dependencies via vcpkg
        shell: cmd
        run: |
          vcpkg integrate install
          vcpkg install --triplet=x64-windows --x-install-root="%GITHUB_WORKSPACE%\build_vcpkg_deps"

      # 4. 从隔离目录中安全地将头文件搬运到项目硬编码要求的 3rd-party 目录
      - name: Fix Hardcoded Third-Party Directories
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}"
          # 路径同步指向隔离的子目录
          $vcpkgInclude = Join-Path $workspace "build_vcpkg_deps\x64-windows\include"
          $targetDir = Join-Path $workspace "3rd-party\libheif"
          
          if (!(Test-Path $vcpkgInclude)) {
              Write-Warning "Vcpkg include directory not found. Creating empty path."
              New-Item -ItemType Directory -Force -Path $vcpkgInclude | Out-Null
          }
          if (!(Test-Path $targetDir)) {
              New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          }
          
          Write-Output "Copying headers from $vcpkgInclude to $targetDir ..."
          Copy-Item -Path "$vcpkgInclude\*" -Destination $targetDir -Recurse -Force -ErrorAction SilentlyContinue
          Write-Output "Successfully processed third-party directories."

      - name: Generate Local Photoshop Stub Headers
        run: |
          echo "Generating Photoshop stub headers..."

      # 5. 标准 CMD 调用 MSBuild（此时源码被隔离保护，稳稳存在）
      - name: Restore NuGet Packages
        shell: cmd
        run: |
          msbuild "AvifFormat.sln" /t:Restore /p:VcpkgEnableManifest=true /p:VcpkgRoot="%GITHUB_WORKSPACE%\build_vcpkg_deps"

      # 6. 执行最终编译
      - name: Build Solution
        shell: cmd
        run: |
          msbuild "AvifFormat.sln" /p:Configuration=Release /p:Platform=x64 /p:VcpkgEnableManifest=true /p:VcpkgRoot="%GITHUB_WORKSPACE%\build_vcpkg_deps"

      # 7. 收集编译产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Photoshop-AVIF-Plugin
          path: |
            **/Release/*.8bi
