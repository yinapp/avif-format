name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 1. 直接拉取第三方维护的、干净完整的 Photoshop SDK 头文件镜像（不再依赖 Adobe 官网链接）
    - name: Clone Photoshop SDK Headers
      uses: actions/checkout@v4
      with:
        repository: textmeshpro/photoshop-pluginsdk
        path: photoshop-sdk-dir
        ref: master

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 2. 正统解法：通过向环境变量注入 PhotoshopSDKDir，让作者的项目文件自动识别 SDK 路径
    - name: Build Solution
      run: |
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n
      env:
        PhotoshopSDKDir: ${{ github.workspace }}\photoshop-sdk-dir\

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AvifFormat_x64_Compiled
        path: |
          vs/x64/Release/AvifFormat.8bi
          vs/Release/AvifFormat.8bi
          vs/x64/Release/Av1Image.8bi
          vs/Release/Av1Image.8bi
