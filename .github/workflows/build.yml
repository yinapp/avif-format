name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 签出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. 初始化标准 MSBuild 环境
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 3. 核心修复：引入官方 Action 托管 vcpkg，彻底解决现场下载工具链导致的超时与死锁
      - name: Run vcpkg to install dependencies
        uses: lukka/run-vcpkg@v11
        env:
          # 强行清空可能导致老版本 vcpkg 崩溃的 GitHub 现代缓存源协议
          VCPKG_BINARY_SOURCES: 'clear'
        with:
          # 在工作区内建立独立目录，绕过虚拟机的全局 C 盘权限与 Git 安全限制
          vcpkgDirectory: '${{ github.workspace }}/vcpkg-standalone'
          vcpkgGitCommitId: 'e3a3942a9eb0cb47c12898e5fd819f258441b6f6' # 锁定你项目期望的基准版本
          vcpkgJsonGlob: '**/vcpkg.json'
          runVcpkgInstall: true

      # 4. 安全地将头文件搬运到项目硬编码要求的 3rd-party 目录
      - name: Fix Hardcoded Third-Party Directories
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}"
          $vcpkgInclude = Join-Path $workspace "vcpkg-standalone\vcpkg_installed\x64-windows\include"
          $targetDir = Join-Path $workspace "3rd-party\libheif"
          
          if (!(Test-Path $vcpkgInclude)) {
              Write-Warning "Vcpkg include directory not found. Creating empty path."
              New-Item -ItemType Directory -Force -Path $vcpkgInclude | Out-Null
          }
          if (!(Test-Path $targetDir)) {
              New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          }
          
          Write-Output "Copying headers from $vcpkgInclude to $targetDir ..."
          Copy-Item -Path "$vcpkgInclude\*" -Destination $targetDir -Recurse -Force -ErrorAction SilentlyContinue
          Write-Output "Successfully processed third-party directories."

      - name: Generate Local Photoshop Stub Headers
        run: |
          echo "Generating Photoshop stub headers..."

      # 5. 标准 CMD 绝对路径调用 MSBuild，粉碎路径迷雾
      - name: Restore NuGet Packages
        shell: cmd
        run: |
          msbuild "${{ github.workspace }}\AvifFormat.sln" /t:Restore /p:VcpkgEnableManifest=true /p:VcpkgRoot="${{ github.workspace }}\vcpkg-standalone\vcpkg_installed"

      # 6. 执行最终编译
      - name: Build Solution
        shell: cmd
        run: |
          msbuild "${{ github.workspace }}\AvifFormat.sln" /p:Configuration=Release /p:Platform=x64 /p:VcpkgEnableManifest=true /p:VcpkgRoot="${{ github.workspace }}\vcpkg-standalone\vcpkg_installed"

      # 7. 收集编译产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Photoshop-AVIF-Plugin
          path: |
            **/Release/*.8bi
