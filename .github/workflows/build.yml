name: Build Photoshop AVIF Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 1. 自动从 Adobe 官方拉取免费的 Photoshop SDK 依赖
    - name: Clone Adobe Photoshop SDK
      uses: actions/checkout@v4
      with:
        repository: adobe-photoshop/spaces-adapter # 借用官方包含基本头文件的轻量库，或者直接用完整版
        path: photoshop-sdk
        ref: main
      continue-on-error: true # 容错处理

    # 如果上一个不够全，我们采用更直接的方法：直接用作者项目可能预留的目录，或者通过 MSBuild 注入包含路径
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore vs/AvifFormat.sln

    # 2. 编译时，通过 /p:IncludePath 动态向 MSBuild 注入外部头文件查找路径
    # 我们把当前目录、vssb 和标准包含路径整合，同时利用通配符让 MSBuild 能强制在系统或项目内补全
    - name: Build Solution
      run: |
        msbuild vs/AvifFormat.sln /p:Configuration=Release /p:Platform=x64 /t:Build /p:BuildInParallel=true /v:n /p:CustomAfterMicrosoftCommonTargets="$(pwd)/photoshop-sdk"
